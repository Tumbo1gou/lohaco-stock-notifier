name: LOHACO 在庫チェック

on:
  # スケジュール起動は cron-job.org からの workflow_dispatch に任せる
  # （GitHub Actions の schedule は無料枠で発火が不安定なため使わない）
  workflow_dispatch:  # 手動実行・cron-job.orgからの起動

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 465
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_USER }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python checker.py

      - name: Commit updated stock status
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stock_status.json
          git diff --staged --quiet || git commit -m "chore: update stock status [skip ci]"
          git push
